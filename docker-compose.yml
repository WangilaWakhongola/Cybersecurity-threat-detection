version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: threat_detection_db
    environment:
      POSTGRES_DB: threat_detection
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - threat_network

  redis:
    image: redis:7-alpine
    container_name: threat_detection_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - threat_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: threat_detection_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-dev-key-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DB_NAME: threat_detection
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - threat_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: threat_detection_celery
    command: celery -A config worker -l info
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-dev-key}
      DB_NAME: threat_detection
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - threat_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: threat_detection_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - threat_network

  prometheus:
    image: prom/prometheus:latest
    container_name: threat_detection_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - threat_network

  grafana:
    image: grafana/grafana:latest
    container_name: threat_detection_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - threat_network

volumes:
  postgres_data:
  redis_data:
  backend_static:
  backend_media:
  prometheus_data:
  grafana_data:

networks:
  threat_network:
    driver: bridge
